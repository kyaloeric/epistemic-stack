# Deploy the static web app. Data under web/data/ is pre-built and committed, so no build
# step is required — the host just serves the folder. To regenerate data after a pipeline
# run: `python web/build_data.py` locally, then commit web/data/.
[build]
  publish = "web"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
